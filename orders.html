<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EFYA PAPABI - Orders</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <style>
        .orders-page {
            padding: 60px 0;
        }
        .orders-page h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
        }
        .orders-table {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        .orders-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .orders-table th {
            text-align: left;
            padding: 15px 12px;
            background: #f8f6f3;
            font-weight: 600;
            border-bottom: 2px solid #eee;
        }
        .orders-table td {
            padding: 15px 12px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: top;
        }
        .orders-table .order-items {
            font-size: 0.9rem;
            color: #666;
        }
        .orders-table .order-items .item {
            padding: 3px 0;
        }
        .orders-table .status-pending {
            color: #f39c12;
            font-weight: 600;
        }
        .orders-table .status-completed {
            color: #28a745;
            font-weight: 600;
        }
        .orders-table .status-cancelled {
            color: #dc3545;
            font-weight: 600;
        }
        .no-orders {
            text-align: center;
            padding: 60px 0;
            color: #999;
        }
        .no-orders i {
            font-size: 4rem;
            display: block;
            margin-bottom: 20px;
            color: #ddd;
        }
        .btn-back {
            display: inline-block;
            padding: 12px 30px;
            background: #0f3460;
            color: white;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .btn-back:hover {
            background: #1a1a2e;
            transform: scale(1.02);
        }
        .btn-whatsapp-order {
            padding: 8px 16px;
            background: #25d366;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-whatsapp-order:hover {
            background: #1da851;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar">
    <div class="container">
        <div class="nav-container">
            <div class="logo">
                <h2>EFYA PAPABI</h2>
                <span>COLLECTIONS</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
                <a href="cart.html" class="cart-link">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </a>
                <a href="admin.html"><i class="fas fa-user-cog"></i></a>
            </div>
            <div class="hamburger" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </div>
</nav>

<!-- Orders Page -->
<section class="orders-page">
    <div class="container">
        <a href="admin.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Admin</a>
        <h1><i class="fas fa-list"></i> All Orders</h1>
        <div class="orders-table" id="ordersTable">
            <!-- Loaded from JS -->
        </div>
    </div>
</section>

<!-- Footer -->
<footer style="background: #0f0f1a; color: #fff; padding: 40px 0 20px; margin-top: 40px;">
    <div class="container">
        <div style="text-align: center; color: #666;">
            <p>&copy; 2026 EFYA PAPABI COLLECTIONS. All rights reserved.</p>
        </div>
    </div>
</footer>

<script src="js/app.js"></script>
<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadAllOrders();
        updateCartCount();
    });
    
    function loadAllOrders() {
        const orders = JSON.parse(localStorage.getItem('efya_orders') || '[]');
        const container = document.getElementById('ordersTable');
        const products = getProducts();
        
        if (orders.length === 0) {
            container.innerHTML = `
                <div class="no-orders">
                    <i class="fas fa-box-open"></i>
                    <h3>No Orders Yet</h3>
                    <p style="color:#999;">Orders will appear here once customers place them</p>
                    <a href="shop.html" class="btn" style="margin-top:20px;display:inline-block;">Start Shopping</a>
                </div>
            `;
            return;
        }
        
        container.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Order Number</th>
                        <th>Customer</th>
                        <th>Phone</th>
                        <th>Location</th>
                        <th>Products Ordered</th>
                        <th>Total</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    ${orders.map(o => `
                        <tr>
                            <td><strong>${o.id}</strong></td>
                            <td>${o.customer}</td>
                            <td>${o.phone}</td>
                            <td>${o.location}</td>
                            <td>
                                <div class="order-items">
                                    ${o.items.map(item => {
                                        const product = products.find(p => p.id === item.id);
                                        return `<div class="item">${product ? product.name : 'Unknown'} (x${item.quantity})</div>`;
                                    }).join('')}
                                </div>
                            </td>
                            <td><strong>GH₵${o.total}</strong></td>
                            <td>${o.date}</td>
                            <td><span class="status-${(o.status || 'pending').toLowerCase()}">${o.status || 'Pending'}</span></td>
                            <td>
                                <button class="btn-whatsapp-order" onclick="sendOrderWhatsApp('${o.id}')">
                                    <i class="fab fa-whatsapp"></i> Send
                                </button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }
    
    function sendOrderWhatsApp(orderId) {
        const orders = JSON.parse(localStorage.getItem('efya_orders') || '[]');
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        
        const products = getProducts();
        let message = 'EFYA PAPABI COLLECTIONS ORDER\n\n';
        message += `Order Number: ${order.id}\n`;
        message += `Customer Name: ${order.customer}\n`;
        message += `Phone: ${order.phone}\n`;
        message += `Location: ${order.location}\n`;
        if (order.notes) message += `Notes: ${order.notes}\n`;
        message += '\nItems Ordered:\n';
        order.items.forEach((item, index) => {
            const product = products.find(p => p.id === item.id);
            if (product) {
                message += `${index+1}. ${product.name}\n`;
                message += `   Code: ${product.code}\n`;
                message += `   Qty: ${item.quantity}\n`;
                message += `   Price: GH₵${product.price}\n`;
                message += `   Size: ${item.size || 'M'} | Color: ${item.color || 'Black'}\n\n`;
            }
        });
        message += `Total: GH₵${order.total}`;
        
        const encoded = encodeURIComponent(message);
        window.open(`https://wa.me/233544527889?text=${encoded}`, '_blank');
    }
    
    function toggleMobileMenu() {
        document.querySelector('.nav-links').classList.toggle('active');
    }
</script>
</body>
</html>
